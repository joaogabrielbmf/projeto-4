<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a33;
      --accent: #c8f04a;
      --accent-dim: rgba(200,240,74,0.12);
      --text: #f0f0f4;
      --muted: #6b6b7a;
      --danger: #ff5c6a;
      --danger-dim: rgba(255,92,106,0.12);
      --radius: 14px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(200,240,74,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 40px;
    }

    .header-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 7vw, 56px);
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .stat-dot.all { background: var(--muted); }
    .stat-dot.done { background: var(--accent); }
    .stat-dot.pending { background: #6b7fff; }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="text"], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color var(--transition);
      resize: none;
      width: 100%;
    }

    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--muted);
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { height: 72px; }

    .btn-add {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 14px 24px;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      align-self: flex-end;
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 18px;
      transition: all var(--transition);
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }

    /* Todo list */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Todo item */
    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      animation: fadeIn 0.25s ease;
      transition: border-color var(--transition), background var(--transition);
    }

    .todo-item:hover { border-color: #3a3a46; }

    .todo-item.completed {
      opacity: 0.55;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .checkbox-wrap {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox {
      appearance: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all var(--transition);
      position: relative;
    }

    .checkbox:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox:checked::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #0d0d0f;
      border-top: none; border-left: none;
      transform: rotate(40deg) translate(-1px, -1px);
      display: block;
    }

    /* Content */
    .todo-content { flex: 1; min-width: 0; }

    .todo-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-desc {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .todo-date {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      opacity: 0.6;
    }

    /* Actions */
    .todo-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 6px 8px;
      transition: all var(--transition);
      line-height: 1;
    }

    .btn-icon:hover { background: var(--surface2); color: var(--text); }
    .btn-icon.danger:hover { background: var(--danger-dim); color: var(--danger); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 14px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 99;
      max-width: 280px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--danger); color: var(--danger); }
    #toast.success { border-color: var(--accent); color: var(--accent); }

    /* Edit modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.2s ease;
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 20px;
      transition: all var(--transition);
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-label">Gerenciador</div>
      <h1>Suas<br><span>Tarefas</span></h1>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-dot all"></div>
          <span id="count-all">0 total</span>
        </div>
        <div class="stat">
          <div class="stat-dot done"></div>
          <span id="count-done">0 concluídas</span>
        </div>
        <div class="stat">
          <div class="stat-dot pending"></div>
          <span id="count-pending">0 pendentes</span>
        </div>
      </div>
    </header>

    <div class="form-card">
      <div class="form-title">Nova tarefa</div>
      <div class="input-group">
        <input type="text" id="todo-title" placeholder="Título da tarefa..." data-cy="todo-title-input" />
        <textarea id="todo-desc" placeholder="Descrição (opcional)..." data-cy="todo-desc-input"></textarea>
        <button class="btn-add" id="add-btn" data-cy="add-todo-btn">+ Adicionar</button>
      </div>
    </div>

    <div class="filters" data-cy="filters">
      <button class="filter-btn active" data-filter="all" data-cy="filter-all">Todas</button>
      <button class="filter-btn" data-filter="pending" data-cy="filter-pending">Pendentes</button>
      <button class="filter-btn" data-filter="completed" data-cy="filter-completed">Concluídas</button>
    </div>

    <div class="todo-list" id="todo-list" data-cy="todo-list">
      <div class="empty-state" id="empty-state">
        <div class="icon">✦</div>
        <p>Nenhuma tarefa ainda.<br>Adicione uma acima.</p>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal" data-cy="edit-modal">
    <div class="modal">
      <h2>Editar tarefa</h2>
      <div class="input-group">
        <input type="text" id="edit-title" placeholder="Título..." data-cy="edit-title-input" />
        <textarea id="edit-desc" placeholder="Descrição..." data-cy="edit-desc-input"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-edit" data-cy="cancel-edit-btn">Cancelar</button>
        <button class="btn-add" id="save-edit" data-cy="save-edit-btn">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
